<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Keystone AI | Architectural Discovery Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root { --eggshell: #F9F8F4; --slate: #2C2C2E; --blueprint: #5B7C99; --sage: #A3AD9A; }
        body { background-color: var(--eggshell); color: var(--slate); font-family: 'Lato', sans-serif; overflow-x: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-heading { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--blueprint); }
        .studio-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); }
        input, select, textarea { background: white !important; border: 1px solid rgba(0,0,0,0.1) !important; padding: 0.8rem !important; outline: none !important; width: 100%; font-size: 16px !important; }
        input:focus, select:focus, textarea:focus { border-color: var(--blueprint) !important; }
        html { scroll-behavior: smooth; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        /* Survey step animations */
        .survey-step { animation: stepIn 0.3s ease forwards; }
        @keyframes stepIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }

        /* Room badge */
        .room-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #f0f4f8; border: 1px solid #5B7C9933; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
        .room-badge:hover { background: #5B7C99; color: white; border-color: #5B7C99; }
        .room-badge.active { background: #2C2C2E; color: white; border-color: #2C2C2E; }

        /* Plan spec panel */
        .spec-panel { background: #f7f6f2; border-left: 3px solid #5B7C99; padding: 12px 16px; margin-bottom: 8px; }
        .spec-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 800; opacity: 0.4; }
        .spec-value { font-size: 12px; font-weight: 600; margin-top: 2px; }

        /* Refinement history */
        .refine-msg { border-left: 2px solid #5B7C99; padding: 6px 12px; margin-bottom: 6px; font-size: 11px; opacity: 0.7; }
        .refine-msg.user { border-color: #2C2C2E; }
    </style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { studio: { eggshell: '#F9F8F4', slate: '#2C2C2E', blueprint: '#5B7C99', sage: '#A3AD9A' } } } }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const FM = window.framerMotion || window.Motion;
        const { motion, useScroll, useTransform, AnimatePresence } = FM;

        const ASSETS = {
            watermark: "images/keystone-line-art.png",
            qrCode: "images/qualtrics-qr.png",
            team: { sujan: "images/sujan.png", subrat: "images/subrat.png", rhythm: "images/rhythm.png" },
            phase1: ["images/1.jpg","images/2.jpg","images/3.jpg","images/4.jpg","images/5.jpg","images/6.jpg"],
            phase2: ["images/7.jpeg","images/8.jpeg","images/9.jpeg","images/10.jpeg","images/11.jpeg","images/12.jpeg","images/13.jpeg","images/14.jpeg"],
            phase3: ["images/15.jpeg","images/16.jpeg","images/17.jpeg","images/18.jpeg","images/19.jpeg","images/20.jpeg"]
        };

        // ─── MOBILE NAV ────────────────────────────────────────────────────────────
        const MobileNavBar = ({ onOpenMenu }) => {
            const scrollTo = (id) => { const el = document.getElementById(id); if(el) el.scrollIntoView({ behavior: 'smooth' }); };
            return (
                <div className="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-studio-slate/10 z-[90] md:hidden pb-safe">
                    <div className="grid grid-cols-5 h-16 items-center">
                        <button onClick={() => scrollTo('hero')} className="flex flex-col items-center justify-center gap-1 text-studio-slate/60 hover:text-studio-blueprint active:scale-95 transition-all">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                            <span className="text-[8px] uppercase font-bold tracking-wider">Home</span>
                        </button>
                        <button onClick={() => scrollTo('generator')} className="flex flex-col items-center justify-center gap-1 text-studio-blueprint active:scale-95 transition-all">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                            <span className="text-[8px] uppercase font-bold tracking-wider">Demo</span>
                        </button>
                        <div className="relative -top-5">
                            <button onClick={() => scrollTo('generator')} className="w-12 h-12 bg-studio-slate rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition-transform">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                        </div>
                        <button onClick={() => scrollTo('pricing')} className="flex flex-col items-center justify-center gap-1 text-studio-slate/60 hover:text-studio-blueprint active:scale-95 transition-all">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span className="text-[8px] uppercase font-bold tracking-wider">Price</span>
                        </button>
                        <button onClick={onOpenMenu} className="flex flex-col items-center justify-center gap-1 text-studio-slate/60 hover:text-studio-blueprint active:scale-95 transition-all">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                            <span className="text-[8px] uppercase font-bold tracking-wider">Menu</span>
                        </button>
                    </div>
                </div>
            );
        };

        const MobileMenuOverlay = ({ isOpen, onClose, onJoin }) => {
            const handleLink = (id) => { const el = document.getElementById(id); if(el) el.scrollIntoView({ behavior: 'smooth' }); onClose(); };
            return (
                <AnimatePresence>
                    {isOpen && (
                        <motion.div initial={{ opacity: 0, y: "100%" }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: "100%" }} transition={{type: "spring", damping: 25, stiffness: 200}} className="fixed inset-0 z-[100] bg-studio-slate text-studio-eggshell flex flex-col pb-safe">
                            <div className="flex justify-between items-center p-6 border-b border-white/10">
                                <span className="font-serif italic text-xl">Menu</span>
                                <button onClick={onClose} className="p-2 bg-white/10 rounded-full"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-8 flex flex-col gap-6">
                                <div className="space-y-6 text-2xl font-serif italic">
                                    <button onClick={() => handleLink('about')} className="block w-full text-left">About Keystone</button>
                                    <button onClick={() => handleLink('problem')} className="block w-full text-left">The Problem</button>
                                    <button onClick={() => handleLink('workflow')} className="block w-full text-left">How It Works</button>
                                    <button onClick={() => handleLink('team')} className="block w-full text-left">Our Team</button>
                                </div>
                                <div className="mt-auto pt-8 border-t border-white/10">
                                    <button onClick={() => { onJoin(); onClose(); }} className="w-full py-4 bg-studio-blueprint text-white uppercase tracking-[0.3em] text-[10px] font-bold">Join Beta Queue</button>
                                </div>
                            </div>
                        </motion.div>
                    )}
                </AnimatePresence>
            );
        };

        const JoinModal = ({ isOpen, onClose }) => {
            const [formData, setFormData] = React.useState({ fullName: '', firmName: '', email: '', volume: '1-10 Projects', questions: '' });
            const [isSubmitting, setIsSubmitting] = React.useState(false);
            const [isSuccess, setIsSuccess] = React.useState(false);
            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
            const handleSubmit = async (e) => {
                e.preventDefault(); setIsSubmitting(true);
                const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeGuYIMrOkuJopGDt-TqRkqVeYrhRE7kIOrWGxEEvz1s4F9NA/formResponse";
                const data = new URLSearchParams();
                data.append("entry.564926659", formData.fullName); data.append("entry.510477948", formData.firmName);
                data.append("entry.1527142228", formData.email); data.append("entry.623368817", formData.volume);
                data.append("entry.1172849489", formData.questions);
                try {
                    await fetch(GOOGLE_FORM_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: data.toString() });
                    setIsSuccess(true);
                    setTimeout(() => { setIsSuccess(false); onClose(); setFormData({fullName:'',firmName:'',email:'',volume:'1-10 Projects',questions:''}); }, 3000);
                } catch(err) { alert("Error submitting. Please try again."); } finally { setIsSubmitting(false); }
            };
            return (
                <AnimatePresence>
                    {isOpen && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-studio-slate/40 backdrop-blur-md">
                            <motion.div initial={{ scale: 0.95, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.95, opacity: 0 }} className="bg-studio-eggshell w-full max-w-4xl shadow-2xl relative flex flex-col md:flex-row overflow-hidden max-h-[90vh]">
                                <button onClick={onClose} className="absolute top-4 right-4 text-3xl font-light z-10 w-10 h-10 bg-white/50 rounded-full flex items-center justify-center">×</button>
                                <div className="p-8 md:w-2/3 border-r border-studio-slate/5 overflow-y-auto">
                                    <h2 className="font-serif text-3xl italic mb-1">Join the Queue.</h2>
                                    <p className="text-[9px] uppercase tracking-widest text-studio-blueprint font-bold mb-6">Onboarding Private Beta Firms</p>
                                    {isSuccess ? (
                                        <div className="flex flex-col items-center justify-center h-64 text-center">
                                            <div className="w-16 h-16 rounded-full bg-studio-blueprint flex items-center justify-center text-white mb-4"><svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg></div>
                                            <h3 className="font-serif text-2xl italic mb-2">Application Received.</h3>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleSubmit} className="space-y-4">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="space-y-1"><label className="text-[8px] uppercase tracking-widest opacity-50 font-bold">Full Name</label><input type="text" name="fullName" value={formData.fullName} onChange={handleChange} required /></div>
                                                <div className="space-y-1"><label className="text-[8px] uppercase tracking-widest opacity-50 font-bold">Firm Name</label><input type="text" name="firmName" value={formData.firmName} onChange={handleChange} required /></div>
                                            </div>
                                            <div className="space-y-1"><label className="text-[8px] uppercase tracking-widest opacity-50 font-bold">Business Email</label><input type="email" name="email" value={formData.email} onChange={handleChange} required /></div>
                                            <div className="space-y-1"><label className="text-[8px] uppercase tracking-widest opacity-50 font-bold">Annual Project Volume</label>
                                                <select name="volume" value={formData.volume} onChange={handleChange}><option>1-10 Projects</option><option>10-30 Projects</option><option>30+ Projects</option></select>
                                            </div>
                                            <div className="space-y-1"><label className="text-[8px] uppercase tracking-widest opacity-50 font-bold">Additional Questions</label><textarea name="questions" rows="2" value={formData.questions} onChange={handleChange}></textarea></div>
                                            <button type="submit" disabled={isSubmitting} className="w-full py-4 bg-studio-blueprint text-white uppercase tracking-[0.4em] text-[10px] font-bold disabled:opacity-50">{isSubmitting ? 'Sending...' : 'Submit Application'}</button>
                                        </form>
                                    )}
                                </div>
                                <div className="hidden md:flex p-8 w-1/3 bg-studio-slate/5 flex-col items-center justify-center text-center">
                                    <img src={ASSETS.qrCode} className="w-28 h-28 bg-white p-2 mb-4" alt="QR" />
                                    <h4 className="font-serif text-lg italic mb-2">Help Us Build.</h4>
                                    <p className="text-[9px] uppercase tracking-widest opacity-40 leading-relaxed">Scan to take our Qualtrics survey.</p>
                                </div>
                            </motion.div>
                        </motion.div>
                    )}
                </AnimatePresence>
            );
        };

        // ─── PLAN SPEC PANEL ───────────────────────────────────────────────────────
        // Displays a summary of the current planSpec so the user can see what's locked in
        const PlanSummaryPanel = ({ planSpec, formData }) => {
            if (!planSpec) return null;
            const allRooms = (planSpec.levels || []).flatMap(l => l.rooms || []);
            const roomCounts = {};
            allRooms.forEach(r => { const t = r.label || r.type; roomCounts[t] = (roomCounts[t]||0)+1; });
            const totalSqFt = planSpec.totalAreaSqFt || 0;
            return (
                <div className="bg-studio-eggshell border border-studio-slate/10 p-4 mt-4 text-xs">
                    <p className="text-[8px] uppercase tracking-widest font-black text-studio-blueprint mb-3">Current Plan Summary</p>
                    <div className="grid grid-cols-3 gap-2 mb-3">
                        <div className="spec-panel"><div className="spec-label">Total Area</div><div className="spec-value">{totalSqFt.toLocaleString()} sqft</div></div>
                        <div className="spec-panel"><div className="spec-label">Stories</div><div className="spec-value">{planSpec.stories}</div></div>
                        <div className="spec-panel"><div className="spec-label">Levels</div><div className="spec-value">{(planSpec.levels||[]).length}</div></div>
                    </div>
                    <div className="flex flex-wrap gap-1">
                        {Object.entries(roomCounts).map(([label, count]) => (
                            <span key={label} className="room-badge active" style={{cursor:'default'}}>
                                {label}{count > 1 ? ` ×${count}` : ''}
                            </span>
                        ))}
                    </div>
                    <p className="text-[8px] uppercase tracking-widest opacity-40 mt-3">Use refinements below to adjust specific rooms only</p>
                </div>
            );
        };

        // ─── REFINEMENT SUGGESTION CHIPS ──────────────────────────────────────────
        const REFINEMENT_SUGGESTIONS = [
            "Make the kitchen larger",
            "Add more natural light to living room",
            "Make the primary bedroom bigger",
            "Move dining room closer to kitchen",
            "Make the garage wider",
            "Expand the master bathroom",
            "Make hallways wider",
            "Add a mudroom near garage",
        ];

        // ─── MULTI-STEP SURVEY ────────────────────────────────────────────────────
        const SURVEY_STEPS = [
            {
                id: 'basics',
                title: 'Basic Requirements',
                subtitle: 'Size, stories, and rooms',
                fields: ['totalArea','stories','bedrooms','bathrooms'],
            },
            {
                id: 'structure',
                title: 'Structure & Site',
                subtitle: 'Garage, shape, and orientation',
                fields: ['garage','shape','frontFacing','lotContext'],
            },
            {
                id: 'lifestyle',
                title: 'Lifestyle & Layout',
                subtitle: 'How you live in the home',
                fields: ['openConcept','masterLocation','kitchenPlacement','laundryLocation','ceilingHeight'],
            },
            {
                id: 'style',
                title: 'Style & Materials',
                subtitle: 'Aesthetic and finishes',
                fields: ['materials','indoorOutdoor','naturalLight'],
            },
            {
                id: 'extras',
                title: 'Special Features',
                subtitle: 'Additional rooms and wishes',
                fields: ['features','accessibilityNeeds','budgetTier','freeformWishes'],
            },
        ];

        const SurveyForm = ({ formData, setFormData, onSubmit, isLoading }) => {
            const [step, setStep] = useState(0);
            const totalSteps = SURVEY_STEPS.length;

            const update = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));

            const renderField = (field) => {
                switch(field) {
                    case 'totalArea': return (
                        <div key={field} className="space-y-2">
                            <label className="text-[8px] uppercase tracking-widest opacity-50 font-bold block">Total Floor Area (Sq Ft)</label>
                            <input type="number" placeholder="e.g. 2400" value={formData.totalArea} onChange={e => update('totalArea', e.target.value)} min="600" max="10000" />
                            <p className="text-[9px] opacity-40">Total finished square footage across all levels</p>
                        </div>
                    );
                    case 'stories': return (
                        <div key={field} className="space-y-2">
                            <label className="text-[8px] uppercase tracking-widest opacity-50 font-bold block">Number of Stories</label>
                            <div className="grid grid-cols-2 gap-2">
                                {['1 Story','2 Stories'].map(opt => (
                                    <button key={opt} type="button" onClick={() => update('stories', opt)} className={`py-3 border text-xs font-bold uppercase tracking-wider transition-all ${formData.stories===opt ? 'bg-studio-slate text-white border-studio-slate' : 'border-studio-slate/20 hover:border-studio-blueprint'}`}>{opt}</button>
                                ))}
                            </div>
                        </div>
                    );
                    case 'bedrooms': return (
                        <div key={field} className="space-y-2">
                            <label className="text-[8px] uppercase tracking-widest opacity-50 font-bold block">Bedrooms</label>
                            <div className="flex gap-2 flex-wrap">
                                {[1,2,3,4,5].map(n => (
                                    <button key={n} type="button" onClick={() => update('bedrooms', `${n} Bed`)} className={`w-12 h-12 border text-sm font-bold transition-all ${formData.bedrooms===`${n} Bed` ? 'bg-studio-slate text-white border-studio-slate' : 'border-studio-slate/20 hover:border-studio-blueprint'}`}>{n}</button>
                                ))}
                            </div>
                        </div>
                    );
                    case 'bathrooms': return (
                        <div key={field} className="space-y-2">
                            <label className="text-[8px] uppercase tracking-widest opacity-50 font-bold block">Full Bathrooms</label>
                            <div className="flex gap-2 flex-wrap">
                                {[1,2,3,4,5].map(n => (
                                    <button key={n} type="button" onClick={() => update('bathrooms', `${n} Bath`)} className={`w-12 h-12 border text-sm font-bold transition-all ${formData.bathrooms===`${n} Bath` ? 'bg-studio-slate text-white border-studio-slate' : 'border-studio-slate/20 hover:border-studio-blueprint'}`}>{n}</button>
                                ))}
                            </div>
                            <p className="text-[9px] opacity-40">Half baths / powder rooms are added automatically</p>
                        </div>
                    );
                    case 'garage': return (
                        <div key={field} className="space-y-2">
                            <label className="text-[8px] uppercase tracking-widest opacity-50 font-bold block">Garage</label>
                            <div className="grid grid-cols-2 gap-2">
                                {['None','1 Car Garage','2 Car Garage','3 Car Garage'].map(opt => (
                                    <button key={opt} type="button" onClick={() => update('garage', opt)} className={`py-3 border text-xs font-bold uppercase tracking-wider transition-all ${formData.garage===opt ? 'bg-studio-slate text-white border-studio-slate' : 'border-studio-slate/20 hover:border-studio-blueprint'}`}>{opt}</button>
                                ))}
                            </div>
                        </div>
                    );
                    case 'shape': return (
                        <div key={field} className="space-y-2">
                            <label className="text-[8px] uppercase tracking-widest opacity-50 font-bold block">Footprint Shape</label>
                            <div className="grid grid-cols-2 gap-2">
                                {['Rectangular','Square'].map(opt => (
                                    <button key={opt} type="button" onClick={() => update('shape', opt)} className={`py-3 border text-xs font-bold uppercase tracking-wider transition-all ${formData.shape===opt ? 'bg-studio-slate text-white border-studio-slate' : 'border-studio-slate/20 hover:border-studio-blueprint'}`}>{opt}</button>
                                ))}
                            </div>
                        </div>
                    );
                    case 'frontFacing': return (
                        <div key={field} className="space-y-2">
                            <label className="text-[8px] uppercase tracking-widest opacity-50 font-bold block">Street / Front Faces</label>
                            <div className="grid grid-cols-4 gap-2">
                                {['North','South','East','West'].map(opt => (
                                    <button key={opt} type="button" onClick={() => update('frontFacing', opt)} className={`py-3 border text-xs font-bold uppercase tracking-wider transition-all ${formData.frontFacing===opt ? 'bg-studio-blueprint text-white border-studio-blueprint' : 'border-studio-slate/20 hover:border-studio-blueprint'}`}>{opt}</button>
                                ))}
                            </div>
                            <p className="text-[9px] opacity-40">Helps orient the garage, entry, and solar gain correctly</p>
                        </div>
                    );
                    case 'lotContext': return (
                        <div key={field} className="space-y-2">
                            <label className="text-[8px] uppercase tracking-widest opacity-50 font-bold block">Lot / Site Context</label>
                            <select value={formData.lotContext||''} onChange={e => update('lotContext', e.target.value)}>
                                <option value="">Select context...</option>
                                <option value="Suburban standard lot">Suburban — standard lot</option>

        // ─── REFINEMENT PANEL ─────────────────────────────────────────────────────

        const RefinementPanel = ({ planSpec, formData, refinementsLeft, onRefine, isLoading, history }) => {

        // ─── 3D RENDER PANEL ──────────────────────────────────────────────────────
        // FIX: 3D render now properly constructs the SVG→PNG conversion and shows
        // a meaningful message when /api/render doesn't exist yet.
        const Render3DPanel = ({ planSpec, formData, planSvg, onRenderReady }) => {
            const [renderStatus, setRenderStatus] = useState('idle'); // idle | converting | loading | ready | unavailable
            const [renderImage, setRenderImage] = useState(null);
            const canvasRef = useRef(null);

            // Convert SVG to PNG base64 for the render API
            const svgToPngBase64 = (svgString) => {
                return new Promise((resolve, reject) => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    let safeSvg = svgString;
                    if (!safeSvg.includes('xmlns=')) safeSvg = safeSvg.replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" ');
                    const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(safeSvg);
                    img.onload = () => {
                        canvas.width = img.width || 1200;
                        canvas.height = img.height || 800;
                        ctx.fillStyle = '#F9F8F4';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0);
                        resolve(canvas.toDataURL('image/png').split(',')[1]);
                    };
                    img.onerror = reject;
                    img.src = url;
                });
            };

            const handleRender = async () => {
                setRenderStatus('converting');
                try {
                    const planPngBase64 = await svgToPngBase64(planSvg);
                    setRenderStatus('loading');

                    const response = await fetch('/api/render', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            surveyData: formData,
                            planSpec: planSpec,
                            planImageBase64: planPngBase64,
                        })
                    });

                    if (response.status === 404) {
                        setRenderStatus('unavailable');
                        return;
                    }

                    const data = await response.json();
                    if (!data.success) throw new Error(data.message || '3D render failed');

                    // Add watermark
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.onload = () => {
                        canvas.width = img.width; canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        const barH = Math.max(30, canvas.height * 0.06);
                        ctx.fillStyle = 'rgba(44,44,46,0.85)';
                        ctx.fillRect(0, canvas.height - barH, canvas.width, barH);
                        ctx.fillStyle = '#fff';
                        ctx.font = `italic ${Math.floor(barH*0.4)}px "Playfair Display", serif`;
                        ctx.textBaseline = 'middle';
                        ctx.fillText('Property of Keystone AI', barH*0.5, canvas.height - barH/2);
                        const watermarked = canvas.toDataURL('image/png');
                        setRenderImage(watermarked);
                        setRenderStatus('ready');
                        if (onRenderReady) onRenderReady(watermarked);
                    };
                    img.src = data.image.startsWith('data:') ? data.image : `data:image/png;base64,${data.image}`;

                } catch (err) {
                    console.error('Render error:', err);
                    setRenderStatus('unavailable');
                }
            };

            const downloadRender = () => {
                const link = document.createElement('a');
                link.href = renderImage;
                link.download = 'Keystone_3D_Render.png';
                link.click();
            };

            if (renderStatus === 'idle') return (
                <button onClick={handleRender} className="w-full md:w-auto bg-studio-blueprint text-white px-8 py-4 uppercase text-[10px] tracking-widest font-bold shadow-lg hover:bg-studio-slate transition-all">
                    ✦ Approve & Render 3D
                </button>
            );

            if (renderStatus === 'converting') return (
                <div className="flex items-center gap-3 text-studio-blueprint">
                    <div className="w-4 h-4 border-2 border-studio-blueprint border-t-transparent rounded-full animate-spin" />
                    <span className="text-[10px] uppercase tracking-widest font-bold">Preparing blueprint...</span>
                </div>
            );

            if (renderStatus === 'loading') return (
                <div className="flex items-center gap-3 text-studio-blueprint">
                    <div className="w-4 h-4 border-2 border-studio-blueprint border-t-transparent rounded-full animate-spin" />
                    <span className="text-[10px] uppercase tracking-widest font-bold">Rendering 3D exterior...</span>
                </div>
            );

            if (renderStatus === 'unavailable') return (
                <div className="p-4 bg-studio-eggshell border border-studio-slate/10 text-center">
                    <p className="text-[9px] uppercase tracking-widest font-bold text-studio-slate opacity-60">3D Rendering</p>
                    <p className="text-[10px] opacity-50 mt-1">The /api/render endpoint is not yet deployed.</p>
                    <p className="text-[9px] opacity-40 mt-1">Connect a render service (Replicate, Stability AI, etc.) to enable this feature.</p>
                </div>
            );

            if (renderStatus === 'ready') return (
                <div className="w-full">
                    <div className="relative">
                        <img src={renderImage} className="w-full object-cover shadow-xl" alt="3D Render" />
                        <div className="absolute top-3 left-3 flex gap-2">
                            <span className="bg-white px-2 py-1 text-[9px] uppercase tracking-widest font-bold shadow-sm">3D Exterior</span>
                            <button onClick={downloadRender} className="bg-studio-blueprint text-white px-2 py-1 text-[9px] uppercase tracking-widest font-bold shadow-sm">Download</button>
                        </div>
                    </div>
                </div>
            );

            return null;
        };

        // ─── DESIGN GENERATOR (main component) ───────────────────────────────────
        const DesignGenerator = () => {
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [passkeyInput, setPasskeyInput] = useState('');
            const [unlockStatus, setUnlockStatus] = useState('idle');

            useEffect(() => {
                try {
                    const saved = JSON.parse(localStorage.getItem('keystone_unlock') || 'null');
                    if (saved?.unlocked) setIsUnlocked(true);

            }, []);

            const [formData, setFormData] = useState({
                location: '',
                totalArea: '2400',
                stories: '2 Stories',
                bedrooms: '3 Bed',
                bathrooms: '3 Bath',
                shape: 'Rectangular',
                garage: '2 Car Garage',
                materials: 'Wood Framing with Natural Finishes',
                openConcept: 'Open Concept (Combined)',
                masterLocation: 'Level 2 (Upper)',
                kitchenPlacement: 'Rear of House',
                features: '1 study, 1 gaming room',
                frontFacing: 'South',
                lotContext: 'Suburban standard lot',
                laundryLocation: 'Level 2 (near bedrooms)',
                ceilingHeight: 'Standard (9 ft)',
                indoorOutdoor: 'Moderate (some connection)',
                naturalLight: 'Balanced windows',
                accessibilityNeeds: 'None',
                budgetTier: 'Mid ($200–300/sqft)',
                freeformWishes: '',
            });

            const [status, setStatus] = useState('idle'); // idle | loading-plan | plan-ready | refining
            const [planSvg, setPlanSvg] = useState(null);
            const [planSpec, setPlanSpec] = useState(null);
            const [refinementHistory, setRefinementHistory] = useState([]);
            const [refinementsLeft, setRefinementsLeft] = useState(10);
            const [zoomImage, setZoomImage] = useState(null);

            const handleUnlock = async (e) => {
                e.preventDefault();
                const key = (passkeyInput || '').trim();
                if (!key) { setUnlockStatus('error:Please enter a passkey.'); return; }
                setUnlockStatus('loading');
                const controller = new AbortController();
                const t = setTimeout(() => controller.abort(), 15000);
                try {
                    const res = await fetch('/api/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ passkey: key }), signal: controller.signal });
                    const data = await res.json().catch(() => null);
                    if (res.ok && data?.success) {
                        setIsUnlocked(true); setUnlockStatus('idle');
                        try { localStorage.setItem('keystone_unlock', JSON.stringify({ unlocked: true, ts: Date.now() })); } catch(_) {}
                        return;
                    }
                    setUnlockStatus(`error:${data?.message || 'Invalid passkey.'}`);
                } catch(err) {
                    setUnlockStatus(err?.name === 'AbortError' ? 'error:Server timed out.' : 'error:Network error.');
                } finally { clearTimeout(t); }
            };

            // ── GENERATE FRESH PLAN ──────────────────────────────────────────────
            const handleGeneratePlan = async () => {
                setStatus('loading-plan');
                try {
                    const res = await fetch('/api/plan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ surveyData: formData, chatHistory: [] })
                    });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.message);
                    setPlanSvg(data.svg);
                    setPlanSpec(data.planSpec);
                    setRefinementHistory([]);
                    setRefinementsLeft(10);
                    setStatus('plan-ready');
                } catch(err) {
                    alert('Error generating plan: ' + err.message);
                    setStatus('idle');
                }
            };

            // ── REFINE EXISTING PLAN ─────────────────────────────────────────────
            // FIX: This is the core fix for "kitchen completely moves when enlarged".
            // Instead of regenerating from scratch, we POST the CURRENT planSpec + 
            // the refinement instruction to /api/plan/refine (a new endpoint you'll need).
            // FALLBACK: Until that endpoint exists, we send the existing plan constraints
            // via surveyData so the tile generator tries to respect the current layout.
            const handleRefine = async (instruction) => {
                if (refinementsLeft <= 0) return;
                setStatus('refining');

                // Build a refinement payload that passes the CURRENT plan state back
                // along with the instruction, so the backend can do a targeted adjustment.
                const refinementPayload = {
                    surveyData: formData,
                    currentPlanSpec: planSpec,          // ← send current layout
                    refinementInstruction: instruction,  // ← specific change requested
                    chatHistory: refinementHistory,
                };

                const newHistory = [...refinementHistory, { role: 'user', content: instruction }];
                setRefinementHistory(newHistory);

                try {
                    // Try the dedicated refinement endpoint first
                    let res = await fetch('/api/plan/refine', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(refinementPayload)
                    });

                    // Fallback: if /api/plan/refine doesn't exist yet, use /api/plan
                    // but inject current room sizes as constraints in surveyData
                    if (res.status === 404) {
                        const constrainedSurveyData = {
                            ...formData,
                            // Encode the refinement as a feature instruction that normalizeBrief can read
                            features: formData.features + ` [REFINE: ${instruction}]`,
                            _refinementInstruction: instruction,
                            _currentRoomSizes: planSpec ? JSON.stringify(
                                (planSpec.levels || []).flatMap(l => (l.rooms || []).map(r => ({
                                    id: r.id, type: r.type, w: r.w, h: r.h, x: r.x, y: r.y
                                })))
                            ) : null,
                        };
                        res = await fetch('/api/plan', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ surveyData: constrainedSurveyData, chatHistory: newHistory })
                        });
                    }

                    const data = await res.json();
                    if (!data.success) throw new Error(data.message);
                    setPlanSvg(data.svg);
                    setPlanSpec(data.planSpec);
                    setRefinementHistory(prev => [...prev, { role: 'assistant', content: `Applied: ${instruction}` }]);
                    setRefinementsLeft(prev => prev - 1);
                    setStatus('plan-ready');
                } catch(err) {
                    alert('Refinement error: ' + err.message);
                    setStatus('plan-ready');
                }
            };

            // Download helper
            const downloadBlueprint = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                let safeSvg = planSvg;
                if (!safeSvg.includes('xmlns=')) safeSvg = safeSvg.replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" ');
                const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(safeSvg);
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.fillStyle = '#F9F8F4'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    const link = document.createElement('a'); link.href = canvas.toDataURL('image/png'); link.download = 'Keystone_Blueprint.png'; link.click();
                };
                img.onerror = () => alert('Download failed.');
                img.src = url;
            };

            const isLoading = status === 'loading-plan' || status === 'refining';

            return (
                <section id="generator" className="py-20 md:py-32 px-6 md:px-10 bg-studio-eggshell relative overflow-hidden">

                        {/* UNLOCK GATE */}

                            {/* ── RIGHT: VIEWER ── */}

                                {/* IDLE STATE */}

                                    </div>

                                {/* LOADING */}
                                {isLoading && (
                                    <div className="absolute inset-0 z-20 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center">
                                        <div className="w-16 h-16 border-4 border-studio-blueprint border-t-transparent rounded-full animate-spin mb-6" />

                                        </div>

                                            <PlanSummaryPanel planSpec={planSpec} formData={formData} />
                                        </div>

                                        {/* Refinement panel */}

                                            formData={formData}
                                            refinementsLeft={refinementsLeft}
                                            onRefine={handleRefine}

                                            <Render3DPanel

                                            />
                                        </div>

                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
